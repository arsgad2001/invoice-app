<!DOCTYPE html>
<html>
<head>
<style>
body{
    background:#0a0f1c;
    color:white;
    font-family:Arial;
}

.card{
    background:#111827;
    margin:20px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 15px #14b8a6;
}

a{
    color:#14b8a6;
}
</style>
</head>

<body>

<h2>Invoice History</h2>

{% for inv in invoices %}
<div class="card">

    <h3>Invoice #{{ inv.id }}</h3>

    <p>
        Customer: {{ inv.customer.name }}
    </p>

    <p>
        Total: ₹{{ inv.total_amount }}
    </p>

    <p>
        Payment: {{ inv.payment_method }}
    </p>

    <a href="/invoice/detail/{{ inv.id }}/">View</a> |

    <a href="/invoice/download/{{ inv.id }}/">
        Download PDF
    </a>

</div>
{% endfor %}

</body>
</html>
