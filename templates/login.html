
<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body {
      background:#0a0f1c;
      color:#fff;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }
    .box{
      background:#111827;
      padding:30px;
      border-radius:10px;
      width: 300px;
      box-shadow: 0 0 20px #14b8a6;
    }
    input {
      width:100%;
      padding:10px;
      margin:10px 0;
      border: none;
      background: #1f2937;
      color:white;
    }
    button {
      width:100%;
      padding:10px;
      background:#14b8a6;
      border:none;
      color:black;
      font-weight:bold;
      cursor:pointer;
    }

    a {
      color:#14b8a6;
    }
</style>
 
</head>

<body>
  <div class="box">
    <h2>Login</h2>
    {%if error %}
    <p style="color:red">{{error}}</p>
    {%endif%}
    
    <form method="POST">
      {% csrf_token%}
      <input name = "username" placeholder="Username">
      <input name = "password" type="password" placeholder="Password">
      <button>Login</button>
    </form>
    <p>New user? <a href="/signup/">Create Account</a></p>
  </div>
</body>
</html>
