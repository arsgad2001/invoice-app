
<!DOCTYPE html>
<html>
<head>
  <title>Signup</title>
  <style>
     body {
      background:#0a0f1c;
      color:#fff;
      font-family:Arial;
      display:flex;
      justify-content:center;
    }
    .box{
      margin-top:50px;
      background:#111827;
      padding:30px;
      border-radius:10px;
      width: 350px;
      box-shadow: 0 0 20px #14b8a6;
    }  
    input,textarea{
      width : 100%;
      margin : 8px 0;
      padding:10px;
      background : #1f2937;
      border:none;
      color:black;
    }
    button {
      width:100%;
      padding:10px;
      background:#14b8a6;
      border:none;
      color:black;
      font-weight:bold;
    }
     
</style>
<head>
<body>
<div class="box">
  <h2>Create Account</h2>
  <form method="POST">
    {% csrf_token %}
    <input name = "name" placeholder="Name" >
    <textarea name="address" placeholder="Address"></textarea>
    <input name = "contact" placeholder="Contact Number" >
    <input name = "emp_id" placeholder="Employee ID" >
    <input name = "department" placeholder="Department" >
    <input name = "username" placeholder="Username" >
    <input name = "password" type="password" placeholder="Password" >
    <button>Create</button>
  </form>
</div>
</body>
</html>
